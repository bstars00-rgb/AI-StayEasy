# Render blueprint for the StayEasy API + managed Postgres.
# Deploy: push to GitHub, then "New + → Blueprint" in Render and pick this repo.
#
# Before deploying, switch the DB to Postgres:
#   1) prisma/schema.prisma → provider = "postgresql"
#   2) commit, then in Render run a one-off: `npm run db:setup`
#      (or add a release command: prisma migrate deploy && tsx prisma/seed.ts)
services:
  - type: web
    name: stayeasy-api
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: stayeasy-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://bstars00-rgb.github.io
      - key: PORT
        value: '8787'

databases:
  - name: stayeasy-db
    plan: free
